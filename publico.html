<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departamentos en renta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F3EE; --surface:#FFF; --surface2:#F0EDE6; --border:#E2DDD4;
  --text:#1A1714; --text2:#6B6560; --text3:#A09A93;
  --accent:#2A5C45; --accent-l:#EAF2EE; --accent-d:#1D4132;
  --amber:#C07C2A; --amber-l:#FBF3E6;
  --font:'DM Sans',sans-serif; --serif:'DM Serif Display',serif;
  --radius:12px; --radius-lg:16px;
  --shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:15px; line-height:1.5; }

/* ── HEADER ── */
.header { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; }
.header-inner { max-width:1080px; margin:0 auto; height:64px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
.header-logo { font-family:var(--serif); font-size:22px; color:var(--accent); text-decoration:none; }
.header-logo span { font-size:13px; font-weight:400; color:var(--text3); margin-left:8px; font-family:var(--font); }

/* ── HERO ── */
.hero { background:var(--accent); padding:48px 24px 40px; text-align:center; }
.hero h1 { font-family:var(--serif); font-size:clamp(28px,5vw,44px); color:#fff; margin-bottom:10px; }
.hero p { font-size:16px; color:rgba(255,255,255,.75); max-width:500px; margin:0 auto; }

/* ── FILTERS ── */
.filters-wrap { background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:40; }
.filters { max-width:1080px; margin:0 auto; padding:0 24px; display:flex; gap:4px; overflow-x:auto; }
.filter-btn { padding:14px 20px; font-size:13px; font-family:var(--font); font-weight:500; border:none; background:none; cursor:pointer; color:var(--text3); border-bottom:2px solid transparent; white-space:nowrap; transition:all .15s; }
.filter-btn:hover { color:var(--text2); }
.filter-btn.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── GRID ── */
.main { max-width:1080px; margin:0 auto; padding:32px 24px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }

/* ── PROPERTY CARD ── */
.prop-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; transition:transform .15s,box-shadow .15s; }
.prop-card:hover { transform:translateY(-3px); box-shadow:0 4px 16px rgba(0,0,0,.1),0 12px 32px rgba(0,0,0,.08); }

.card-photo { position:relative; height:200px; background:var(--surface2); overflow:hidden; }
.card-photo img { width:100%; height:100%; object-fit:cover; }
.card-photo-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:linear-gradient(135deg,var(--surface2) 0%,var(--border) 100%); }
.card-photo-placeholder .ph-icon { font-size:40px; opacity:.35; }
.card-photo-placeholder .ph-type { font-size:13px; color:var(--text3); font-weight:500; }
.card-tipo-badge { position:absolute; top:12px; left:12px; }
.badge { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-noche { background:rgba(42,76,127,.9); color:#fff; }
.badge-mes   { background:rgba(42,92,69,.9);  color:#fff; }
.badge-ambas { background:rgba(192,124,42,.9); color:#fff; }

.card-body { padding:16px 18px 20px; }
.card-dir { font-family:var(--serif); font-size:17px; color:var(--text); margin-bottom:4px; line-height:1.3; }
.card-col { font-size:13px; color:var(--text3); margin-bottom:12px; }
.card-specs { display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
.card-spec { font-size:13px; color:var(--text2); display:flex; align-items:center; gap:4px; }
.card-spec-icon { font-size:14px; }
.card-prices { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:16px; align-items:baseline; }
.price-noche { font-size:20px; font-weight:500; color:var(--text); }
.price-mes   { font-size:20px; font-weight:500; color:var(--accent); }
.price-label { font-size:12px; color:var(--text3); }
.price-sep   { color:var(--border); font-size:18px; }
.card-cta { width:100%; padding:11px; border-radius:10px; font-size:14px; font-weight:500; font-family:var(--font); border:none; cursor:pointer; background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .15s; }
.card-cta:hover { background:#1ebe5d; }
.card-cta svg { width:18px; height:18px; fill:currentColor; flex-shrink:0; }

/* ── MODAL ── */
.modal-overlay { position:fixed; inset:0; background:rgba(20,16,12,.5); z-index:200; display:flex; align-items:flex-end; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
@media(min-width:600px){ .modal-overlay { align-items:center; padding:24px; } }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border-radius:var(--radius-lg) var(--radius-lg) 0 0; width:100%; max-width:640px; max-height:92vh; overflow-y:auto; transform:translateY(20px); transition:transform .25s; }
@media(min-width:600px){ .modal { border-radius:var(--radius-lg); } }
.modal-overlay.open .modal { transform:translateY(0); }

.modal-photo { height:220px; background:var(--surface2); position:relative; }
.modal-photo img { width:100%; height:100%; object-fit:cover; }
.modal-photo-ph { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:64px; opacity:.2; }
.modal-close { position:absolute; top:12px; right:12px; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,.4); border:none; cursor:pointer; color:#fff; font-size:16px; display:flex; align-items:center; justify-content:center; }
.modal-body { padding:20px 22px 28px; }
.modal-tipo-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.modal-dir { font-family:var(--serif); font-size:22px; line-height:1.3; margin-bottom:4px; }
.modal-col { font-size:14px; color:var(--text3); margin-bottom:16px; }
.modal-specs { display:flex; gap:16px; padding:14px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:16px; flex-wrap:wrap; }
.modal-spec { text-align:center; flex:1; min-width:60px; }
.modal-spec .ms-val { font-size:18px; font-weight:500; color:var(--text); }
.modal-spec .ms-lbl { font-size:11px; color:var(--text3); margin-top:2px; }
.modal-desc { font-size:14px; color:var(--text2); line-height:1.7; margin-bottom:18px; }
.modal-prices { display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap; }
.price-box { flex:1; min-width:120px; background:var(--bg); border-radius:10px; padding:12px 14px; }
.price-box .pb-val { font-size:22px; font-weight:500; color:var(--text); }
.price-box .pb-lbl { font-size:12px; color:var(--text3); margin-top:2px; }
.price-box.green { background:var(--accent-l); }
.price-box.green .pb-val { color:var(--accent); }

/* ── CONTACT FORM ── */
.form-section { background:var(--bg); border-radius:var(--radius); padding:18px; }
.form-section h4 { font-family:var(--serif); font-size:17px; margin-bottom:14px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
.form-group { display:flex; flex-direction:column; gap:5px; }
.form-group label { font-size:12px; font-weight:500; color:var(--text2); }
.form-group input, .form-group select, .form-group textarea {
  padding:9px 12px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:var(--font);
  background:var(--surface); color:var(--text); outline:none; transition:border-color .15s; width:100%;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--accent); }
.form-group textarea { resize:vertical; min-height:80px; }
.form-full { grid-column:1/-1; }
.submit-btn { width:100%; padding:13px; border-radius:10px; font-size:15px; font-weight:500; font-family:var(--font); border:none; cursor:pointer; background:#25D366; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px; margin-top:14px; transition:background .15s; }
.submit-btn:hover { background:#1ebe5d; }
.submit-btn:disabled { opacity:.6; cursor:default; }
.submit-btn svg { width:20px; height:20px; fill:currentColor; }
.success-msg { text-align:center; padding:24px; color:var(--accent); }
.success-msg .sm-icon { font-size:40px; margin-bottom:10px; }
.success-msg h4 { font-family:var(--serif); font-size:20px; margin-bottom:6px; }
.success-msg p { font-size:14px; color:var(--text2); }

/* ── EMPTY ── */
.empty-state { text-align:center; padding:80px 24px; color:var(--text3); }
.empty-state h3 { font-family:var(--serif); font-size:24px; color:var(--text2); margin-bottom:8px; }
.empty-state p { font-size:14px; max-width:320px; margin:0 auto; }

/* ── LOADING ── */
.loading-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
.skeleton { background:var(--surface); border-radius:var(--radius-lg); overflow:hidden; border:1px solid var(--border); }
.skel-photo { height:200px; background:var(--surface2); animation:pulse 1.5s ease-in-out infinite; }
.skel-body { padding:16px 18px 20px; }
.skel-line { height:14px; background:var(--surface2); border-radius:4px; margin-bottom:10px; animation:pulse 1.5s ease-in-out infinite; }
.skel-line.short { width:60%; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

/* ── FOOTER ── */
.footer { background:var(--surface); border-top:1px solid var(--border); padding:24px; text-align:center; font-size:13px; color:var(--text3); margin-top:40px; }

@media(max-width:480px) {
  .main { padding:20px 16px; }
  .form-row { grid-template-columns:1fr; }
  .modal-specs { gap:10px; }
  .modal-prices { flex-direction:column; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a class="header-logo" href="#">
      Departamentos
      <span>en renta · Guadalajara</span>
    </a>
  </div>
</header>

<div class="hero">
  <h1>Encuentra tu próximo hogar</h1>
  <p>Departamentos disponibles para renta por noche y por mes en Guadalajara</p>
</div>

<div class="filters-wrap">
  <div class="filters">
    <button class="filter-btn active" data-filter="todos" onclick="setFilter('todos',this)">Todos</button>
    <button class="filter-btn" data-filter="noche" onclick="setFilter('noche',this)">Por noche</button>
    <button class="filter-btn" data-filter="mes" onclick="setFilter('mes',this)">Por mes</button>
  </div>
</div>

<div class="main">
  <div id="grid" class="grid">
    <div class="loading-grid" id="skeletons" style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px">
      ${[1,2,3].map(()=>`<div class="skeleton"><div class="skel-photo"></div><div class="skel-body"><div class="skel-line"></div><div class="skel-line short"></div></div></div>`).join('')}
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal"></div>
</div>

<footer class="footer">
  Todos los precios en pesos mexicanos (MXN) · <a href="index.html" style="color:var(--accent)">Acceso CRM</a>
</footer>

<script>
const SUPA_URL = 'https://bhahvkubdzcvbbzlrgrl.supabase.co';
const SUPA_KEY = 'sb_publishable_KMFcd40pKjj-Z0bQzuL6DA_D9YPNjYo';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

let allDeptos = [];
let currentFilter = 'todos';
let currentDepto = null;

function fmtMXN(n) { return '$' + (Number(n)||0).toLocaleString('es-MX'); }

/* ── LOAD DEPTOS ── */
async function loadDeptos() {
  const { data, error } = await sb.from('inmuebles').select('*').eq('publicado', true).order('created_at', { ascending: false });
  document.getElementById('skeletons').remove();
  if (error || !data?.length) {
    document.getElementById('grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Próximamente disponible</h3><p>Estamos preparando nuestros departamentos. Vuelve pronto.</p></div>`;
    return;
  }
  allDeptos = data;
  renderCards(data);
}

/* ── FILTER ── */
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = f === 'todos' ? allDeptos : allDeptos.filter(d => d.tipo_renta === f || d.tipo_renta === 'ambas');
  renderCards(filtered);
}

/* ── RENDER CARDS ── */
function renderCards(deptos) {
  const grid = document.getElementById('grid');
  if (!deptos.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><h3>Sin resultados</h3><p>No hay departamentos disponibles en esta categoría por ahora.</p></div>`;
    return;
  }
  grid.innerHTML = deptos.map(d => cardHTML(d)).join('');
}

function tipoBadge(tipo) {
  if (tipo === 'noche') return `<span class="badge badge-noche">Por noche</span>`;
  if (tipo === 'mes')   return `<span class="badge badge-mes">Por mes</span>`;
  return `<span class="badge badge-ambas">Noche · Mes</span>`;
}

function photoEl(fotos, cls) {
  if (fotos?.length) return `<img src="${fotos[0]}" alt="Foto departamento" loading="lazy">`;
  return `<div class="card-photo-placeholder"><div class="ph-icon">🏠</div><div class="ph-type">Foto próximamente</div></div>`;
}

function cardHTML(d) {
  let prices = '';
  if (d.tipo_renta === 'noche' || d.tipo_renta === 'ambas') prices += `<div><span class="price-noche">${fmtMXN(d.precio_noche)}</span><span class="price-label"> / noche</span></div>`;
  if (d.tipo_renta === 'ambas') prices += `<span class="price-sep">·</span>`;
  if (d.tipo_renta === 'mes'   || d.tipo_renta === 'ambas') prices += `<div><span class="price-mes">${fmtMXN(d.precio)}</span><span class="price-label"> / mes</span></div>`;

  return `<div class="prop-card" onclick="openDepto('${d.id}')">
    <div class="card-photo">
      ${photoEl(d.fotos)}
      <div class="card-tipo-badge">${tipoBadge(d.tipo_renta)}</div>
    </div>
    <div class="card-body">
      <div class="card-dir">${d.direccion}</div>
      <div class="card-col">${d.colonia||''}</div>
      <div class="card-specs">
        ${d.recamaras ? `<span class="card-spec"><span class="card-spec-icon">🛏</span>${d.recamaras} rec.</span>` : ''}
        ${d.banos     ? `<span class="card-spec"><span class="card-spec-icon">🚿</span>${d.banos} baño${d.banos>1?'s':''}</span>` : ''}
        ${d.m2        ? `<span class="card-spec"><span class="card-spec-icon">📐</span>${d.m2} m²</span>` : ''}
        ${d.mascotas === 'si' ? `<span class="card-spec"><span class="card-spec-icon">🐾</span>Mascotas</span>` : ''}
      </div>
      <div class="card-prices">${prices}</div>
      <button class="card-cta" onclick="event.stopPropagation();openDepto('${d.id}')">
        <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.116.554 4.103 1.523 5.824L0 24l6.338-1.498A11.935 11.935 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.814 9.814 0 01-5.004-1.37l-.36-.213-3.72.879.923-3.619-.234-.372A9.796 9.796 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>
        Consultar por WhatsApp
      </button>
    </div>
  </div>`;
}

/* ── OPEN DEPTO MODAL ── */
function openDepto(id) {
  currentDepto = allDeptos.find(d => d.id === id);
  if (!currentDepto) return;
  const d = currentDepto;

  let pricesHTML = '';
  if (d.tipo_renta === 'noche' || d.tipo_renta === 'ambas') pricesHTML += `<div class="price-box"><div class="pb-val">${fmtMXN(d.precio_noche)}</div><div class="pb-lbl">por noche</div></div>`;
  if (d.tipo_renta === 'mes'   || d.tipo_renta === 'ambas') pricesHTML += `<div class="price-box green"><div class="pb-val">${fmtMXN(d.precio)}</div><div class="pb-lbl">por mes</div></div>`;

  const tipoOpts = d.tipo_renta === 'noche' ? `<option value="noche">Por noche</option>` :
                   d.tipo_renta === 'mes'   ? `<option value="mes">Por mes</option>` :
                   `<option value="noche">Por noche</option><option value="mes" selected>Por mes</option>`;

  document.getElementById('modal').innerHTML = `
    <div class="modal-photo">
      ${d.fotos?.length ? `<img src="${d.fotos[0]}" alt="Foto">` : `<div class="modal-photo-ph">🏠</div>`}
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-tipo-row">${tipoBadge(d.tipo_renta)}${d.amueblado&&d.amueblado!=='no'?`<span class="badge" style="background:var(--amber-l);color:var(--amber)">Amueblado</span>`:''}</div>
      <div class="modal-dir">${d.direccion}</div>
      <div class="modal-col">${d.colonia||''}</div>
      <div class="modal-specs">
        ${d.recamaras ? `<div class="modal-spec"><div class="ms-val">${d.recamaras}</div><div class="ms-lbl">Recámaras</div></div>` : ''}
        ${d.banos     ? `<div class="modal-spec"><div class="ms-val">${d.banos}</div><div class="ms-lbl">Baños</div></div>` : ''}
        ${d.m2        ? `<div class="modal-spec"><div class="ms-val">${d.m2}</div><div class="ms-lbl">m²</div></div>` : ''}
        ${d.deposito  ? `<div class="modal-spec"><div class="ms-val">${d.deposito}</div><div class="ms-lbl">Meses depós.</div></div>` : ''}
      </div>
      ${d.descripcion_publica ? `<p class="modal-desc">${d.descripcion_publica}</p>` : ''}
      <div class="modal-prices">${pricesHTML}</div>

      <div class="form-section" id="formSection">
        <h4>Solicitar información</h4>
        <div class="form-row">
          <div class="form-group"><label>Tu nombre *</label><input id="f-nombre" placeholder="Nombre completo"></div>
          <div class="form-group"><label>WhatsApp *</label><input id="f-tel" type="tel" placeholder="33 1234 5678"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Correo electrónico</label><input id="f-email" type="email" placeholder="correo@ejemplo.com"></div>
          <div class="form-group"><label>Tipo de renta</label><select id="f-tipo">${tipoOpts}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Fecha de entrada</label><input id="f-entrada" type="date"></div>
          <div class="form-group"><label>Fecha de salida / fin</label><input id="f-salida" type="date"></div>
        </div>
        <div class="form-row">
          <div class="form-group form-full"><label>Mensaje (opcional)</label><textarea id="f-mensaje" placeholder="¿Alguna pregunta o comentario?"></textarea></div>
        </div>
        <button class="submit-btn" onclick="enviarSolicitud()" id="submitBtn">

        </button>

    </div>`;

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

/* ── ENVIAR SOLICITUD ── */
async function enviarSolicitud() {
  const nombre  = document.getElementById('f-nombre').value.trim();
  const tel     = document.getElementById('f-tel').value.trim();
  if (!nombre || !tel) { alert('Por favor ingresa tu nombre y WhatsApp'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = 'Enviando...';

  const d = currentDepto;
  const tipo     = document.getElementById('f-tipo').value;
  const entrada  = document.getElementById('f-entrada').value;
  const salida   = document.getElementById('f-salida').value;
  const mensaje  = document.getElementById('f-mensaje').value.trim();

  await sb.from('reservaciones').insert({
    inmueble_id:   d.id,
    inmueble_dir:  d.direccion,
    nombre,
    telefono:      tel,
    email:         document.getElementById('f-email').value.trim() || null,
    fecha_entrada: entrada || null,
    fecha_salida:  salida  || null,
    tipo_solicitud: tipo,
    mensaje:       mensaje || null,
    estado:        'pendiente',
    fuente:        'web',
  });

  // Armar mensaje de WhatsApp
  const tipoLabel = tipo === 'noche' ? 'por noche' : 'por mes';
  let waMsg = `Hola! Me interesa el departamento en *${d.direccion}*`;
  if (d.colonia) waMsg += `, ${d.colonia}`;
  waMsg += `\n\n*Renta:* ${tipoLabel}`;
  if (entrada) waMsg += `\n*Entrada:* ${entrada}`;
  if (salida)  waMsg += `\n*Salida:* ${salida}`;
  waMsg += `\n\n*Mi nombre:* ${nombre}\n*Teléfono:* ${tel}`;
  if (mensaje)  waMsg += `\n\n${mensaje}`;

  const waNum = (d.whatsapp || '').replace(/\D/g, '');
  if (waNum) window.open(`https://wa.me/52${waNum}?text=${encodeURIComponent(waMsg)}`, '_blank');

  document.getElementById('formSection').innerHTML = `
    <div class="success-msg">
      <div class="sm-icon">✅</div>
      <h4>¡Solicitud enviada!</h4>
      <p>Se abrió WhatsApp con tu mensaje. Te responderemos a la brevedad.</p>
    </div>`;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }

loadDeptos();
</script>
